<!DOCTYPE html>

  <title>JOSH - Your Diet. Your Progress.</title>
  <link rel="stylesheet" href="styles.css">

<body>
  <div class="app-container">
    <!-- Sidebar Kiri -->
    <aside class="sidebar">
      <div class="logo-section">
        <h2>JOSH</h2>

      </div>
      <nav class="nav-menu">
